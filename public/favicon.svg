<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0b1528"/>
    </linearGradient>

    <!-- Rocket body Gradient -->
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <!-- Rocket accent/fins Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Thrust Fire Gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>

    <!-- Orbit ring Gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="1"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>

  <!-- Star field -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="120" cy="140" r="3" />
    <circle cx="380" cy="120" r="4" fill="#38bdf8" />
    <circle cx="400" cy="380" r="2.5" />
    <circle cx="150" cy="390" r="3.5" fill="#818cf8" />
    <circle cx="280" cy="80" r="2" />
  </g>

  <!-- Planet/Orbital sphere outline (background layer) -->
  <circle cx="200" cy="312" r="90" fill="none" stroke="#1e293b" stroke-width="4" stroke-dasharray="12 8"/>

  <!-- Orbit Ring -->
  <path d="M 90 380 C 130 460, 360 440, 430 320 C 470 250, 450 180, 390 150 C 330 120, 200 200, 130 280 C 80 340, 60 380, 80 385 C 90 387, 110 375, 140 350" 
        fill="none" 
        stroke="url(#orbitGrad)" 
        stroke-width="12" 
        stroke-linecap="round" 
        filter="url(#glow)"/>

  <!-- Fire Thrust -->
  <path d="M 200 312 L 130 410 C 120 425, 125 435, 140 430 L 222 334 Z" fill="url(#fireGrad)" filter="url(#glow)"/>
  <path d="M 195 320 L 110 440 C 100 455, 115 460, 130 445 L 210 330 Z" fill="#ef4444"/>

  <!-- Spacecraft/Rocket Body -->
  <!-- Left Fin -->
  <path d="M 190 310 C 150 310, 120 350, 115 375 C 130 375, 175 360, 185 330 Z" fill="url(#accentGrad)"/>
  <!-- Right Fin -->
  <path d="M 265 235 C 265 195, 305 165, 330 160 C 330 175, 315 220, 285 230 Z" fill="url(#accentGrad)"/>

  <!-- Main Fuselage -->
  <path d="M 185 330 C 230 230, 310 150, 360 110 C 375 98, 400 95, 415 110 C 430 125, 427 150, 415 165 C 375 215, 295 295, 195 340 C 190 342, 182 337, 185 330 Z" 
        fill="url(#rocketGrad)"/>

  <!-- Cockpit/Window -->
  <ellipse cx="340" cy="180" rx="14" ry="24" transform="rotate(-45 340 180)" fill="#22d3ee" filter="url(#glow)"/>
  <ellipse cx="340" cy="180" rx="8" ry="15" transform="rotate(-45 340 180)" fill="#ffffff"/>

  <!-- Wing highlight/trim -->
  <path d="M 230 280 L 370 140" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Propulsion Sparkles / Stars near nose -->
  <path d="M 430 80 L 440 80 M 435 75 L 435 85" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <path d="M 455 115 L 461 115 M 458 112 L 458 118" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
</svg>